<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Salud</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="contenedor">

    <h1>Encuesta de Salud</h1>

    <form id="formulario">

        <label>Edad</label>
        <input 
        type="number" 
        id="edad"
        min="1" 
        max="100"
        required>

        <label>Peso (kg)</label>
        <input 
        type="number"
        id="peso"
        min="20"
        max="250"
        required>

        <label>Nivel de dolor</label>

        <div class="rango">
            <input 
            type="range"
            id="dolor"
            min="0"
            max="10"
            value="5">

            <span id="valorDolor">5</span>
        </div>

        <label>Tipo de sangre</label>

        <select id="sangre" required>
            <option value="">Selecciona</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>O+</option>
            <option>O-</option>
            <option>AB+</option>
            <option>AB-</option>
        </select>

        <button type="submit">
            Enviar Encuesta
        </button>

    </form>

    <div id="resultado"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
